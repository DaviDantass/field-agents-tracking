spring:
  datasource:
    url: jdbc:h2:mem:tracking-test;MODE=MySQL;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    username: sa
    password:
    driver-class-name: org.h2.Driver

  jpa:
    hibernate:
      ddl-auto: create-drop
    show-sql: false
    open-in-view: false

app:
  schedulers:
    sync-locations:
      enabled: false
    geofencing:
      enabled: false
    history-cleanup:
      enabled: false
    monitoring:
      enabled: false
